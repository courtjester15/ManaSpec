<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>ManaSpec</title>
  <link rel="icon" href="assets/images/favicon.ico?v=20260710-nav" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32.png?v=20260710-nav">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/images/favicon-192.png?v=20260710-nav">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon.png?v=20260710-nav">

  <!--
  SYSTEM HEADER (DEV RULES)
  - Data source: Scryfall API (read-only)
  - State: localStorage "specs"
  - UI: vanilla JS
  - Workflow: Search -> Printings -> Add Spec -> Portfolio
  - Position model: Card + Set + Collector # + Foil flag
  - Pricing: USD only (current snapshot)
  - No backend
  -->

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@latest/css/pico.min.css">

  <link rel="stylesheet" href="css/style.css?v=20260713-price-history-polish">
</head>

<body>

<main class="container">

  <header class="app-header">
    <div class="app-logo-frame" aria-hidden="true">
      <img class="app-logo" src="assets/images/manaspec-mark.png" alt="">
    </div>
    <div>
      <h2>ManaSpec <small>v0.9.0-alpha.1</small></h2>
      <p class="app-subtitle">MTG speculation workflow and positions terminal</p>
    </div>
    <div class="app-header-actions">
      <div id="summaryBar">
        <div><span>Cash</span> $<strong id="cash">0</strong></div>
        <div><span>Invested</span> $<strong id="invested">0</strong></div>
        <div><span>Value</span> $<strong id="value">0</strong></div>
        <div><span>Total</span> $<strong id="totalEquity">0</strong></div>
        <div><span>P/L</span> <strong id="totalPL">0</strong></div>
        <div id="priceRefreshStatus">Prices: not checked</div>
      </div>
      <button type="button" class="help-open-btn" id="openHelpDrawer">Help</button>
    </div>
  </header>

  <section class="workbar">
    <nav class="toolbar" aria-label="Main navigation">
      <button type="button" class="toolbar-tab active" data-view="dashboard">
        <span class="toolbar-tab-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M12 3v9h9"></path><path d="M20.5 15.5A9 9 0 1 1 8.5 3.5"></path></svg>
        </span>
        Dashboard
      </button>
      <button type="button" class="toolbar-tab" data-view="radar">
        <span class="toolbar-tab-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="7"></circle><circle cx="12" cy="12" r="2"></circle><path d="M12 3v3"></path><path d="M12 18v3"></path><path d="M3 12h3"></path><path d="M18 12h3"></path></svg>
        </span>
        Radar
      </button>
      <button type="button" class="toolbar-tab" data-view="portfolio">
        <span class="toolbar-tab-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><rect x="4" y="7" width="16" height="12" rx="2"></rect><path d="M9 7V5h6v2"></path><path d="M4 12h16"></path><path d="M10 12v2h4v-2"></path></svg>
        </span>
        Positions
      </button>
      <button type="button" class="toolbar-tab" data-view="signals">
        <span class="toolbar-tab-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M5 12a7 7 0 0 1 14 0"></path><path d="M8 12a4 4 0 0 1 8 0"></path><path d="M12 12v6"></path><path d="M9 18h6"></path></svg>
        </span>
        Signals
      </button>
      <button type="button" class="toolbar-tab" data-view="transactions">
        <span class="toolbar-tab-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M7 7h11"></path><path d="m15 4 3 3-3 3"></path><path d="M17 17H6"></path><path d="m9 14-3 3 3 3"></path></svg>
        </span>
        Transactions
      </button>
      <button type="button" class="toolbar-tab" data-view="history">
        <span class="toolbar-tab-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M4 12a8 8 0 1 0 2.3-5.7"></path><path d="M4 5v5h5"></path><path d="M12 8v5l3 2"></path></svg>
        </span>
        History
      </button>
      <button type="button" class="toolbar-tab" data-view="admin">
        <span class="toolbar-tab-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.4-2.4 1a7.8 7.8 0 0 0-1.7-1L14.5 3h-5l-.4 3.1a7.8 7.8 0 0 0-1.7 1l-2.4-1-2 3.4L5 11a7 7 0 0 0 0 2l-2 1.5 2 3.4 2.4-1a7.8 7.8 0 0 0 1.7 1l.4 3.1h5l.4-3.1a7.8 7.8 0 0 0 1.7-1l2.4 1 2-3.4-2-1.5a7 7 0 0 0 .1-1z"></path></svg>
        </span>
        Admin
      </button>
    </nav>

    <section class="global-search-bar" aria-label="Universal card search">
      <input id="universalSearch" placeholder="Search cards...">
      <button type="button" id="universalSearchButton">Search</button>
    </section>
  </section>

  <div id="toastStack" class="toast-stack" role="status" aria-live="polite"></div>
  <div id="appConfirmDialog" class="app-confirm-dialog" aria-hidden="true"></div>

  <section id="viewContainer" class="view-container"></section>

</main>

<script src="assets/vendor/chart.js/chart.umd.min.js"></script>

<script src="js/core/app.js"></script>

  </small>

</html>
