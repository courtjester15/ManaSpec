<!DOCTYPE html>

<!--
====================================
ManaSpec
MTG Speculation Trading Terminal

Version: 0.8.0-alpha
Author: Jason Elie
====================================
-->

<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>ManaSpec</title>

  <!--
  SYSTEM HEADER (DEV RULES)
  - Data source: Scryfall API (read-only)
  - State: localStorage "specs"
  - UI: vanilla JS
  - Workflow: Search -> Printings -> Add Spec -> Portfolio
  - Position model: Card + Set + Collector # + Foil flag
  - Pricing: USD only (current snapshot)
  - No backend
  -->

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@latest/css/pico.min.css">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<main class="container">

  <header class="app-header">
    <img class="app-logo" src="assets/images/manaspeclogo.png" alt="ManaSpec logo">
    <div>
      <h2>ManaSpec <small>v0.8.0-alpha</small></h2>
      <p class="app-subtitle">MTG speculation workflow and positions terminal</p>
    </div>
    <div class="app-header-actions">
      <div id="summaryBar">
        <div><span>Cash</span> $<strong id="cash">0</strong></div>
        <div><span>Invested</span> $<strong id="invested">0</strong></div>
        <div><span>Value</span> $<strong id="value">0</strong></div>
        <div><span>Total</span> $<strong id="totalEquity">0</strong></div>
        <div><span>P/L</span> <strong id="totalPL">0</strong></div>
        <div id="priceRefreshStatus">Prices: not checked</div>
      </div>
      <button type="button" class="help-open-btn" id="openHelpDrawer">Help</button>
    </div>
  </header>

  <section class="workbar">
    <nav class="toolbar" aria-label="Main navigation">
      <button type="button" class="toolbar-tab active" data-view="dashboard">Dashboard</button>
      <button type="button" class="toolbar-tab" data-view="radar">Radar</button>
      <button type="button" class="toolbar-tab" data-view="portfolio">Positions</button>
      <button type="button" class="toolbar-tab" data-view="signals">Signals</button>
      <button type="button" class="toolbar-tab" data-view="transactions">Transactions</button>
      <button type="button" class="toolbar-tab" data-view="history">History</button>
      <button type="button" class="toolbar-tab" data-view="admin">Admin</button>
    </nav>

    <section class="global-search-bar" aria-label="Universal card search">
      <input id="universalSearch" placeholder="Search cards...">
      <button type="button" id="universalSearchButton">Search</button>
    </section>
  </section>

  <div id="toastStack" class="toast-stack" role="status" aria-live="polite"></div>
  <div id="appConfirmDialog" class="app-confirm-dialog" aria-hidden="true"></div>

  <section id="viewContainer" class="view-container"></section>

</main>

<!-- MANASPEC MODULES -->
<script src="js/core/storage.js"></script>
<script src="js/core/state.js"></script>

<script src="js/modules/card-metadata/card-metadata.js"></script>
<script src="js/modules/notes/notes.js"></script>
<script src="js/modules/card-filters/card-filters.js"></script>
<script src="js/ui/table.js"></script>
<script src="js/ui/context-band.js"></script>
<script src="js/modules/dashboard/dashboard.js"></script>

<script src="js/modules/portfolio/trading.js"></script>
<script src="js/modules/portfolio/portfolio.js"></script>

<script src="js/modules/portfolio/printings.js"></script>
<script src="js/modules/portfolio/search.js"></script>
<script src="js/modules/radar/radar.js"></script>
<script src="js/modules/transactions/transactions.js"></script>
<script src="js/modules/signals/signals.js"></script>
<script src="js/modules/thesis/thesis.js"></script>
<script src="js/modules/history/history.js"></script>
<script src="js/modules/admin/admin.js"></script>
<script src="js/modules/card-details/card-details.js"></script>

<script src="js/ui/summary.js"></script>
<script src="js/ui/help.js"></script>
<script src="js/modules/portfolio/snapshots.js"></script>
<script src="js/modules/portfolio/pricing.js"></script>

<script src="js/core/app.js"></script>

<footer>
  <small>
    ManaSpec v0.8.0-alpha<br>
    &copy; 2026 Jason Elie
  </small>
</footer>

</body>

</html>
